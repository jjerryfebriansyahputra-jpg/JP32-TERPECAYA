<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP32 - Permainan</title>

<link rel="stylesheet" href="dashboard.css">

<style>
body{
    background:#050816;
}

.game-page{
    max-width:1200px;
    margin:50px auto;
    padding:30px;
}

.game-banner{
    height:300px;
    border-radius:20px;

    background:
    linear-gradient(
    rgba(0,0,0,.4),
    rgba(0,0,0,.6)
    ),
    url('images/jp32-banner.jpg');

    background-size:cover;
    background-position:center;

    border:1px solid #8a2be2;
}

.game-menu{
    margin-top:25px;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.game-card{
    background:#08111f;

    border:1px solid #00d4ff;

    border-radius:20px;

    padding:30px;

    text-align:center;

    color:white;

    text-decoration:none;

    transition:.3s;
}

.game-card:hover{
    transform:translateY(-5px);

    box-shadow:
    0 0 20px #00d4ff;
}
</style>

</head>
<body>

<div class="game-page">

    <div class="game-banner"></div>

    <div class="game-menu">

        <a href="#" class="game-card">
            🐉 Dragon Fortune
        </a>

        <a href="#" class="game-card">
            💎 Lucky Diamond
        </a>

        <a href="#" class="game-card">
            👑 Royal Jackpot
        </a>

    </div>

</div>

<audio id="bgMusic" loop>
    <source src="f:\JP Tiga Dua.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function () {
    const music = document.getElementById("bgMusic");
    music.play();
}, { once: true });
</script>

#musicBtn{
    background:#00d4ff;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

</body>
</html>
